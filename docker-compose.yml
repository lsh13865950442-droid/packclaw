version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: packclaw-postgres
    environment:
      POSTGRES_DB: packclaw
      POSTGRES_USER: root
      POSTGRES_PASSWORD: lsh123456
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d packclaw"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - packclaw-network

  backend:
    image: 114.214.255.82:18080/public/packclaw:v0.01.arm
    container_name: packclaw-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/packclaw?currentSchema=public
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=lsh123456
      - HOME=/root
    expose:
      - "8080"
    volumes:
      - $HOME/.packclaw:/root/.packclaw
    networks:
      - packclaw-network

  frontend:
    image: 114.214.255.82:18080/public/packclaw-frontend:v0.01.arm
    container_name: packclaw-frontend
    depends_on:
      - backend
    ports:
      - "6789:80"
    networks:
      - packclaw-network

volumes:
  postgres_data:
    driver: local

networks:
  packclaw-network:
    driver: bridge
